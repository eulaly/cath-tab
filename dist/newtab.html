<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script type="module" crossorigin src="/assets/newtab-Bmu2ZNKD.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/newtab-BvwZtbdp.css">
</head>
<body>
  <button id="openSettingsBtn" class="settings-button" type="button">settings</button>
  <div id="drawerBackdrop" class="drawer-backdrop" hidden></div>
    <aside id="settingsDrawer" class="settings-drawer" hidden aria-hidden="true">
      <div class="drawer-header">
        <h2 class="drawer-title">Settings</h2>
        <button id="closeSettingsBtn" class="drawer-close-button" type="button" aria-label="close settings">
          ×
        </button>
      </div>

      <div class="drawer-content">
        <label for="versionSelect">default bible version</label>
        <select id="versionSelect"></select>

        <div class="drawer-actions">
          <button id="saveSettingsBtn" class="save-button" type="button">save</button>
          <span id="settingsStatus" class="settings-status"></span>
        </div>
      </div>
    </aside>

  <main class="shell">
    <div class="card">
      <p id="verse" class="verse"></p>
      <p id="reference" class="ref"></p>

      <footer class="footer">
        <div class="footer-meta">
          <a id="versionLink" class="version-link"></a>
          <span class="attribution"> · powered by biblegateway.com</span>
          </div>
      </footer>
      
    </div>
  </main>

</body>
</html>
